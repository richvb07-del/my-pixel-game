<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Pixel Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            touch-action: none;
        }
        body {
            background-color: #2e1e0a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ffcc00;
            text-shadow: 2px 2px #442200;
            margin-bottom: 5px;
            font-size: 1.4rem;
            text-align: center;
        }
        .ui-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 0 10px;
            margin-bottom: 5px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffcc00;
        }
        #game-container {
            position: relative;
            width: 95vw;
            height: 60vh;
            max-width: 400px;
            max-height: 500px;
            background-color: #5dae64;
            border: 6px solid #442200;
            border-radius: 4px;
            overflow: hidden;
        }
        /* კურდღელი */
        #player {
            position: absolute;
            width: 50px;
            height: 50px;
            background-image: url('bunny.png?v=1');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
        }
        /* სტაფილო (დიდი ზომა - 55px) */
        .item {
            position: absolute;
            width: 55px;
            height: 55px;
            background-image: url('carrot.png?v=1');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            animation: bounce 0.5s infinite alternate;
        }
        /* ბომბი (დიდი ზომა - 55px) */
        .bomb {
            position: absolute;
            width: 55px;
            height: 55px;
            background-image: url('bomb.png?v=1');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 30, 10, 0.9);
            backdrop-filter: blur(3px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h2 {
            color: #ff3333;
            font-size: 2.2rem;
            text-shadow: 2px 2px #442200;
            margin-bottom: 15px;
        }
        .btn {
            background: #ffcc00;
            border: 3px solid #442200;
            color: #442200;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 2px 2px #442200;
        }
        .controls-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #a08060;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>COZY PIXEL COLLECTOR</h1>

    <div class="ui-container">
        <div id="score-board">სტაფილო: <span id="score">0</span></div>
        <div id="level-board">სიჩქარე: <span id="speed">ნელი</span></div>
    </div>

    <div id="game-container">
        <div id="player"></div>
        
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <button class="btn" onclick="resetGame()">თავიდან</button>
        </div>
    </div>

    <div class="controls-hint">
        მართვა: <b>დააჭირე ეკრანს თითით ან მაუსით</b> იქ, სადაც გინდა წავიდეს.
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const speedElement = document.getElementById('speed');
        const gameOverScreen = document.getElementById('game-over-screen');

        let containerWidth = 400;
        let containerHeight = 400;
        const playerWidth = 50;
        const playerHeight = 50;

        let playerX = 150;
        let playerY = 150;
        let score = 0;
        let isGameOver = false;

        let targetX = playerX;
        let targetY = playerY;
        const baseSpeed = 4;
        let speed = baseSpeed;
        let currentLevel = 1;

        let items = [];
        let bombs = [];
        
        let spawnItemTimer = 0;
        let spawnBombTimer = 0;

        function setTarget(clientX, clientY) {
            if (isGameOver) return;
            const rect = container.getBoundingClientRect();
            targetX = clientX - rect.left - (playerWidth / 2);
            targetY = clientY - rect.top - (playerHeight / 2);
        }

        container.addEventListener('mousedown', (e) => setTarget(e.clientX, e.clientY));
        container.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                setTarget(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        function createItem() {
            const item = document.createElement('div');
            item.classList.add('item');
            let x = Math.random() * (containerWidth - 60);
            let y = Math.random() * (containerHeight - 60);
            item.style.left = x + 'px';
            item.style.top = y + 'px';
            container.appendChild(item);
            items.push({ element: item, x: x, y: y });
        }

        function createBomb() {
            const bomb = document.createElement('div');
            bomb.classList.add('bomb');
            let x = Math.random() * (containerWidth - 60);
            let y = Math.random() * (containerHeight - 60);
            bomb.style.left = x + 'px';
            bomb.style.top = y + 'px';
            container.appendChild(bomb);
            bombs.push({ element: bomb, x: x, y: y });
        }

        function update() {
            if (isGameOver) return;

            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;

            let dx = targetX - playerX;
            let dy = targetY - playerY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                playerX += (dx / distance) * speed;
                playerY += (dy / distance) * speed;
            } else {
                playerX = targetX;
                playerY = targetY;
            }

            if (playerX < 0) playerX = 0;
            if (playerY < 0) playerY = 0;
            if (playerX > containerWidth - playerWidth) playerX = containerWidth - playerWidth;
            if (playerY > containerHeight - playerHeight) playerY = containerHeight - playerHeight;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';

            // შეჯახება სტაფილოსთან
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                let dist = Math.sqrt(Math.pow((item.x + 27.5) - (playerX + 25), 2) + Math.pow((item.y + 27.5) - (playerY + 25), 2));
                if (dist < 45) {
                    item.element.remove();
                    items.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = score;
                    updateLevel();
                    createItem();
                }
            }

            // შეჯახება ბომბთან
            for (let i = bombs.length - 1; i >= 0; i--) {
                let bomb = bombs[i];
