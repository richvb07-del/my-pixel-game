<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Pixel Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            touch-action: none;
        }
        body {
            background-color: #2e1e0a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ffcc00;
            text-shadow: 2px 2px #442200;
            margin-bottom: 5px;
            font-size: 1.4rem;
            text-align: center;
        }
        .ui-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 0 10px;
            margin-bottom: 5px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffcc00;
        }
        #game-container {
            position: relative;
            width: 95vw;
            height: 60vh;
            max-width: 400px;
            max-height: 500px;
            background-color: #5dae64;
            border: 6px solid #442200;
            border-radius: 4px;
            overflow: hidden;
        }
        #player {
            position: absolute;
            width: 32px;
            height: 32px;
            background: linear-gradient(180deg, #ff99cc 0%, #ff66aa 100%);
            border: 2px solid #fff;
            border-radius: 4px;
            box-shadow: 2px 2px rgba(0, 0, 0, 0.2);
        }
        .item {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #ff3333;
            border: 2px solid #990000;
            border-radius: 2px;
            box-shadow: 2px 2px rgba(0, 0, 0, 0.2);
            animation: bounce 0.5s infinite alternate;
        }
        .bomb {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #333;
            border: 3px solid #ff0000;
            border-radius: 50%;
            box-shadow: 2px 2px rgba(0, 0, 0, 0.3);
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(1.1); opacity: 0.8; }
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 30, 10, 0.9);
            backdrop-filter: blur(3px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h2 {
            color: #ff3333;
            font-size: 2.2rem;
            text-shadow: 2px 2px #442200;
            margin-bottom: 15px;
        }
        .btn {
            background: #ffcc00;
            border: 3px solid #442200;
            color: #442200;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 2px 2px #442200;
        }
        .controls-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #a08060;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>COZY PIXEL COLLECTOR</h1>

    <div class="ui-container">
        <div id="score-board">ვაშლები: <span id="score">0</span></div>
        <div id="level-board">სიჩქარე: <span id="speed">ნელი</span></div>
    </div>

    <div id="game-container">
        <div id="player"></div>
        
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <button class="btn" onclick="resetGame()">თავიდან</button>
        </div>
    </div>

    <div class="controls-hint">
        მართვა: <b>დააჭირე ეკრანს თითით ან მაუსით</b> იქ, სადაც გინდა წავიდეს.
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const speedElement = document.getElementById('speed');
        const gameOverScreen = document.getElementById('game-over-screen');

        let containerWidth = 400;
        let containerHeight = 400;
        const playerWidth = 32;
        const playerHeight = 32;

        let playerX = 150;
        let playerY = 150;
        let score = 0;
        let isGameOver = false;

        let targetX = playerX;
        let targetY = playerY;
        const baseSpeed = 4;
        let speed = baseSpeed;
        let currentLevel = 1;

        let items = [];
        let bombs = [];
        
        let spawnItemTimer = 0;
        let spawnBombTimer = 0;

        function setTarget(clientX, clientY) {
            if (isGameOver) return;
            const rect = container.getBoundingClientRect();
            targetX = clientX - rect.left - (playerWidth / 2);
            targetY = clientY - rect.top - (playerHeight / 2);
        }

        container.addEventListener('mousedown', (e) => setTarget(e.clientX, e.clientY));
        container.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                setTarget(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        function createItem() {
            const item = document.createElement('div');
            item.classList.add('item');
            let x = Math.random() * (containerWidth - 30);
            let y = Math.random() * (containerHeight - 30);
            item.style.left = x + 'px';
            item.style.top = y + 'px';
            container.appendChild(item);
            items.push({ element: item, x: x, y: y });
        }

        function createBomb() {
            const bomb = document.createElement('div');
            bomb.classList.add('bomb');
            let x = Math.random() * (containerWidth - 25);
            let y = Math.random() * (containerHeight - 25);
            bomb.style.left = x + 'px';
            bomb.style.top = y + 'px';
            container.appendChild(bomb);
            bombs.push({ element: bomb, x: x, y: y });
        }

        function update() {
            if (isGameOver) return;

            // ზომების მუდმივი კონტროლი
            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;

            // კურდღლის მოძრაობა
            let dx = targetX - playerX;
            let dy = targetY - playerY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 5) {
                playerX += (dx / distance) * speed;
                playerY += (dy / distance) * speed;
            } else {
                playerX = targetX;
                playerY = targetY;
            }

            if (playerX < 0) playerX = 0;
            if (playerY < 0) playerY = 0;
            if (playerX > containerWidth - playerWidth) playerX = containerWidth - playerWidth;
            if (playerY > containerHeight - playerHeight) playerY = containerHeight - playerHeight;

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';

            // ვაშლის შეჭმა
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                let dist = Math.sqrt(Math.pow(item.x - playerX, 2) + Math.pow(item.y - playerY, 2));
                if (dist < 28) {
                    item.element.remove();
                    items.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = score;
                    updateLevel();
                    createItem();
                }
            }

            // ბომბზე აფეთქება
            for (let i = bombs.length - 1; i >= 0; i--) {
                let bomb = bombs[i];
                let dist = Math.sqrt(Math.pow(bomb.x - playerX, 2) + Math.pow(bomb.y - playerY, 2));
                if (dist < 24) {
                    endGame();
                    return;
                }
            }

            // უსაფრთხო სპავნერი ნაცვლად setInterval-ისა
            spawnItemTimer++;
            if (spawnItemTimer > 300) { // დაახლოებით 5 წამი
                if (items.length < 3) createItem();
                spawnItemTimer = 0;
            }

            spawnBombTimer++;
            if (spawnBombTimer > 450) { // დაახლოებით 7 წამი
                if (bombs.length < 4) createBomb();
                spawnBombTimer = 0;
            }

            requestAnimationFrame(update);
        }

        function updateLevel() {
            let nextLevel = Math.floor(score / 100) + 1;
            if (nextLevel > currentLevel) {
                currentLevel = nextLevel;
                speed = baseSpeed + (currentLevel - 1) * 1.2;
                let spdText = "ნელი";
                if (currentLevel > 2) spdText = "საშუალო";
                if (currentLevel > 4) spdText = "სწრაფი";
                speedElement.innerText = spdText;
            }
        }

        function endGame() {
            isGameOver = true;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            currentLevel = 1;
            speed = baseSpeed;
            isGameOver = false;
            scoreElement.innerText = score;
            speedElement.innerText = "ნელი";
            gameOverScreen.style.display = 'none';
            
            items.forEach(i => i.element.remove());
            items = [];
            bombs.forEach(b => b.element.remove());
            bombs = [];

            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;
            playerX = (containerWidth / 2) - (playerWidth / 2);
            playerY = (containerHeight / 2) - (playerHeight / 2);
            targetX = playerX;
            targetY = playerY;

            createItem();
            createBomb();
            requestAnimationFrame(update);
        }

        // პირველი სტარტი
        setTimeout(() => {
            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;
            playerX = (containerWidth / 2) - (playerWidth / 2);
            playerY = (containerHeight / 2) - (playerHeight / 2);
            targetX = playerX;
            targetY = playerY;
            createItem();
            createBomb();
            requestAnimationFrame(update);
        }, 100);
    </script>
</body>
</html>
