<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Pixel Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            touch-action: none;
        }
        body {
            background-color: #2e1e0a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ffcc00;
            text-shadow: 2px 2px #442200;
            margin-bottom: 5px;
            font-size: 1.4rem;
            text-align: center;
        }
        .ui-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 0 10px;
            margin-bottom: 5px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffcc00;
        }
        #game-container {
            position: relative;
            width: 95vw;
            height: 60vh;
            max-width: 400px;
            max-height: 500px;
            background-color: #5dae64;
            border: 6px solid #442200;
            border-radius: 4px;
            overflow: hidden;
        }
        #player {
            position: absolute;
            width: 32px;
            height: 32px;
            background: linear-gradient(180deg, #ff99cc 0%, #ff66aa 100%);
            border: 2px solid #fff;
            border-radius: 4px;
            box-shadow: 2px 2px rgba(0, 0, 0, 0.2);
            z-index: 5;
        }
        /* კიდევ უფრო დიდი ზომები (50px) ტელეფონისთვის */
        .item {
            position: absolute;
            width: 50px;
            height: 50px;
            background-image: url('apple.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            animation: bounce 0.5s infinite alternate;
        }
        .bomb {
            position: absolute;
            width: 50px;
            height: 50px;
            background-image: url('bomb.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 30, 10, 0.9);
            backdrop-filter: blur(3px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h2 {
            color: #ff3333;
            font-size: 2.2rem;
            text-shadow: 2px 2px #442200;
            margin-bottom: 15px;
        }
        .btn {
            background: #ffcc00;
            border: 3px solid #442200;
            color: #442200;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 2px 2px #442200;
        }
        .controls-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #a08060;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
